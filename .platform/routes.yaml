"https://www.{all}/":
  type: upstream
  upstream: "unity:http"
  cache:
    enabled: false
    headers: ['Accept', 'Accept-Language', 'X-Language-Locale']
    default_ttl: 3600
    # Base the cache on the session cookie and custom Drupal cookies. Ignore all other cookies.
    cookies: ['/^SS?ESS/', '/^Drupal.visitor/']

"https://{all}/":
  type: redirect
  to: "https://www.{all}/"
