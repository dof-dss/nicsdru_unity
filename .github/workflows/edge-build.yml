name: Unity edge build

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

jobs:
  unity-edge-build:
    uses: dof-dss/webdev-ci/.github/workflows/unity-edge-build.yml@WDT-154
    permissions:
      contents: write
    with:
      source_branch: development
      edge_build_branch: edge
      php_version: '8.3'
      node_version: '18'
      edge_build_dofdss_packages: 'dof-dss/nicsdru_origins_theme:dev-10.x-dev dof-dss/nicsdru_origins_modules:dev-10.x-dev'
    secrets:
      PLATFORM_CLI_TOKEN: ${{ secrets.PLATFORM_CLI_TOKEN }}
      PLATFORM_PROJECT: ${{ secrets.PLATFORM_PROJECT }}
